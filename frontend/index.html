<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner - AI-Powered Learning Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">📚 Study Planner</h1>
                <p class="tagline">AI-Powered Learning</p>
            </div>
            
            <nav class="nav-menu">
                <button class="nav-item active" data-view="dashboard">
                    <span class="icon">📊</span>
                    <span>Dashboard</span>
                </button>
                <button class="nav-item" data-view="documents">
                    <span class="icon">📄</span>
                    <span>Documents</span>
                </button>
                <button class="nav-item" data-view="analytics">
                    <span class="icon">📈</span>
                    <span>Analytics</span>
                </button>
            </nav>
            
            <div class="sidebar-footer">
                <button class="btn-new-subject" id="newSubjectBtn">
                    <span class="icon">➕</span>
                    <span>New Subject</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="search-box">
                    <input type="text" placeholder="Search subjects..." id="searchInput">
                </div>
                <div class="user-info">
                    <span class="user-name">Demo User</span>
                </div>
            </header>

            <!-- Dashboard View -->
            <div class="view active" id="dashboardView">
                <div class="view-header">
                    <h2>Your Subjects</h2>
                    <p class="subtitle">Manage your study materials</p>
                </div>

                <div class="subjects-grid" id="subjectsGrid">
                    <!-- Subject cards will be inserted here -->
                </div>

                <div class="empty-state" id="emptyState" style="display: none;">
                    <div class="empty-icon">📚</div>
                    <h3>No subjects yet</h3>
                    <p>Create your first subject to get started</p>
                    <button class="btn-primary" onclick="document.getElementById('newSubjectBtn').click()">
                        Create Subject
                    </button>
                </div>
            </div>

            <!-- Documents View -->
            <div class="view" id="documentsView">
                <div class="view-header">
                    <h2>Documents</h2>
                    <button class="btn-back" id="backToSubjects">← Back to Subjects</button>
                </div>

                <div class="subject-details" id="subjectDetails">
                    <!-- Subject info will be displayed here -->
                </div>

                <div class="upload-area" id="uploadArea">
                    <div class="upload-box">
                        <div class="upload-icon">📤</div>
                        <h3>Upload Document</h3>
                        <p>Drag & drop or click to select</p>
                        <p class="upload-formats">PDF, DOCX, PPT supported</p>
                        <input type="file" id="fileInput" accept=".pdf,.docx,.doc,.pptx,.ppt" hidden>
                        <button class="btn-primary" onclick="document.getElementById('fileInput').click()">
                            Choose File
                        </button>
                    </div>
                </div>

                <div class="documents-list" id="documentsList">
                    <!-- Documents will be listed here -->
                </div>
            </div>

            <!-- Analytics View (Chunk Viewer) -->
            <div class="view" id="analyticsView">
                <div class="view-header">
                    <h2>Content Analysis</h2>
                    <button class="btn-back" id="backToDocuments">← Back to Documents</button>
                </div>

                <div class="filters">
                    <button class="filter-btn active" data-type="all">All</button>
                    <button class="filter-btn" data-type="concept">Concept</button>
                    <button class="filter-btn" data-type="formula">Formula</button>
                    <button class="filter-btn" data-type="definition">Definition</button>
                    <button class="filter-btn" data-type="example">Example</button>
                    <button class="filter-btn" data-type="pyq">PYQ</button>
                    <button class="filter-btn" data-type="highlight">Highlight</button>
                </div>

                <div class="stats-panel" id="statsPanel">
                    <!-- Stats will be shown here -->
                </div>

                <div class="chunks-list" id="chunksList">
                    <!-- Chunks will be displayed here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for New Subject -->
    <div class="modal" id="subjectModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Create New Subject</h3>
                <button class="modal-close" onclick="closeModal('subjectModal')">&times;</button>
            </div>
            <form id="subjectForm">
                <div class="form-group">
                    <label>Subject Name *</label>
                    <input type="text" name="name" required placeholder="e.g., Operating Systems">
                </div>
                <div class="form-group">
                    <label>Course Code</label>
                    <input type="text" name="code" placeholder="e.g., CS301">
                </div>
                <div class="form-group">
                    <label>Exam Date</label>
                    <input type="date" name="exam_date">
                </div>
                <div class="form-group">
                    <label>Priority (1-10)</label>
                    <input type="range" name="priority" min="1" max="10" value="5" oninput="this.nextElementSibling.textContent = this.value">
                    <span class="priority-value">5</span>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal('subjectModal')">Cancel</button>
                    <button type="submit" class="btn-primary">Create Subject</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="spinner"></div>
        <p id="loadingText">Loading...</p>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/app.js"></script>
</body>
</html>
